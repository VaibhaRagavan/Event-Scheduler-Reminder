<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, inCountryCodeal-scale=1" />
  <title>Sign Up</title>
  <!-- Bootstrap 5 CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/css/intlTelInput.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body class="bg-light">
  <div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card p-4 shadow" style="width: 100%; max-width: 500px; border-radius: 1rem;">
      <h3 class="text-center mb-4">Create an Account</h3>

      <form onsubmit="newaccount(event)">
        <div class="mb-3">
          <label for="fullname" class="form-label">Full Name</label>
          <input type="text" class="form-control" id="fullname" placeholder="Enter your full name" required />
        </div>

        <div class="mb-3">
          <label for="dob" class="form-label">Date of Birth</label>
          <input type="date" class="form-control" id="dob" placeholder="YYYY-MM-DD" required />
        </div>
        <div class="mb-3">
          <label for="phone" class="form-label">Phone Number</label>
          <input type="tel" class="form-control" id="phone"
            placeholder="Enter your Phonenumber (+ countrycode phonenumber) " required />
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Email Address</label>
          <input type="email" class="form-control" id="email" placeholder="Enter your email" required />
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input type="password" class="form-control" id="password" placeholder="Create a password" required />
          <div class="form-text text-muted">
            Password must be at least 8 characters, contain a number, and a lowercase letter.
          </div>
          <div class="form-text">
            <ul class="mb-0">
              <li id="lengthCheck1" class="text-danger">At least 8 characters</li>
              <li id="numberCheck1" class="text-danger">At least one number</li>
              <li id="lowerCheck1" class="text-danger">At least one lowercase letter</li>
            </ul>
          </div>
        </div>

        <div class="mb-3">
          <label for="confirm-password" class="form-label">Confirm Password</label>
          <input type="password" class="form-control" id="confirm-password" placeholder="Confirm your password"
            required />
        </div>

        <button type="submit" class="btn btn-primary w-100">Sign Up</button>
      </form>

      <p class="text-center mt-3">
        Already have an account? <a href="index.html">Login here</a>
      </p>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/intlTelInput.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/utils.js"></script>
  <script>
    //countrycode for phonennumber
    const phoneInput = document.getElementById('phone');
    const CountryCode = window.intlTelInput(phoneInput, {
      initialCountry: "us",
      utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/utils.js"
    });
    phoneInput.CountryCode = CountryCode
    console.log(CountryCode);
    // Real-time validation
    const passwordInput = document.getElementById("password");

    passwordInput.addEventListener("input", () => {
      const pwd = passwordInput.value;

      // Password rules
      document.getElementById("lengthCheck1").className =
        pwd.length >= 8 ? "text-success" : "text-danger";
      document.getElementById("numberCheck1").className =
        /\d/.test(pwd) ? "text-success" : "text-danger";
      document.getElementById("lowerCheck1").className =
        /[a-z]/.test(pwd) ? "text-success" : "text-danger";
    });

    // Submit handler
    async function newaccount(event) {
      event.preventDefault();

      const pwd1 = document.getElementById("password").value;
      const pwd2 = document.getElementById("confirm-password").value;

      const isStrongPassword =
        pwd1.length >= 8 && /\d/.test(pwd1) && /[a-z]/.test(pwd1);

      if (!isStrongPassword) {
        alert("Password does not meet the required criteria.");
        return;
      }

      if (pwd1 !== pwd2) {
        alert("Passwords do not match.");
        return;
      }

      const full_name = document.getElementById("fullname").value;
      const dob = document.getElementById("dob").value;
      const email = document.getElementById("email").value;
      const phone = phoneInput.CountryCode.getNumber();
      console.log(phone)
      try {
        const res = await fetch(
          "https://wn1jv4hbnd.execute-api.eu-west-1.amazonaws.com/default/Register_newaccount",
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              name: full_name,
              dob: dob,
              email: email,
              password: pwd1,
              phonenumber:phone
            }),
          }
        );

        const results = await res.json();

        if (results.message === "User created successfully" || "User details updated") {
          alert("Your account has been created successfully. Please log in.");
          window.location.href = "confirm.html";
        } else if (results.response === "Email already exists") {
          alert("An account with this email already exists.");
        } else if (
          results.response === "Password does not meet policy requirements"
        ) {
          alert("Password does not meet requirements. Please try a stronger one.");
        } else {
          alert(results.response || "An error occurred. Please try again.");
        }
      } catch (error) {
        console.error("Error creating account:", error);
        alert("Something went wrong. Please try again.");
      }
    }
  </script>
</body>

</html>
