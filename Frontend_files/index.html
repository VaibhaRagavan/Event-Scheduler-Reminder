<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, inCountryCodeal-scale=1">
  <title>Login Page</title>
  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow p-4" style="width: 100%; max-width: 400px; border-radius: 1rem;">
      <h3 class="text-center mb-4">Login</h3>
      <form onsubmit="verify_account(event)">
        <div class="mb-3">
          <label for="email" class="form-label">Email address</label>
          <input type="email" class="form-control" id="email" placeholder="Enter email">
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input type="password" class="form-control" id="password" placeholder="Password">
        </div>
        <div class="mb-3 text-end">
            <button type="button" class="btn btn-primary w-20" onclick="window.location.href='resetpwd.html' ">ForgetPassword</button>
       </div>
        
        <button type="submit" class="btn btn-primary w-100" >Login</button>
      </form>
      <div class="text-center mt-4">
        <p>Don't have a account?</p>
        <button type="button" class="btn btn-primary w-50" onclick="window.location.href='register.html'">Register Here</button>
    </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    async  function verify_account(event){
      event.preventDefault();
        const email_id=document.getElementById("email").value;
        const password=document.getElementById("password").value;
        

        const resp= await fetch("https://wn1jv4hbnd.execute-api.eu-west-1.amazonaws.com/default/LoginPage",{
            method:"POST",
            headers:{'Content-Type':'application/json',
          },
            body:JSON.stringify({"email":email_id,"password":password}),
        })
        const data=await resp.json();
        if(resp.ok){
        const message=data.response;
        const token=data.token;
        


          if (message=="Login successful"){
            sessionStorage.setItem('authToken', token);

            window.location.href='homepage.html'
          }else{
            alert("Invalid email or password Try again")
           
          }
      }

   }
  </script>
</body>
</html>
