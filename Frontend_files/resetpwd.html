
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, inCountryCodeal-scale=1">
  <title>Login Page</title>
  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<div class="container d-flex justify-content-center align-items-center min-vh-100">
  <div class="card shadow p-4" style="width: 100%; max-width: 400px; border-radius: 1rem;">
    <h3 class="text-center mb-4">Update Password</h3>
    <form>
      <div class="mb-3" id="step1">
        <label for="email" class="form-label">Email address</label>
        <input type="email" class="form-control" id="email" placeholder="Enter email">
      </div>
      <div class="mb-3 text-end">
          <button type="button" class="btn btn-primary w-20" onclick="sendCode()">Send Verification Code</button>
     </div>
     <div  class='mb-3'id="step2" style="display:none;">
      <div>
      <label for="code" class="form-label">Verification Code</label>
      <input type="text" class="form-control" id="code" placeholder="Enter code from email" />
    </div>
    <div>
      <label for="password" class="form-label">New Password</label>
      <input type="password" class="form-control"id="newPwd" placeholder="New password" />
      
      <button type="button" class="btn btn-primary w-100"    onclick="confirmReset()">Confirm New Password</button>
    </div>
    </div>
      
  </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
async function sendCode() {
  const email = document.getElementById('email').value;
  const res = await fetch(" https://wn1jv4hbnd.execute-api.eu-west-1.amazonaws.com/default/Password_reset", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ action: "start", email })
  });
  const data = await res.json();
  if (res.ok) {
    alert("Verification code sent to your email.");
    document.getElementById('step2').style.display = 'block';
  } else {
    alert(data.message);
  }
}

async function confirmReset() {
  const email = document.getElementById('email').value;
  const code = document.getElementById('code').value;
  const new_password = document.getElementById('newPwd').value;

  const res = await fetch(" https://wn1jv4hbnd.execute-api.eu-west-1.amazonaws.com/default/Password_reset", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ action: "confirm", email, code, new_password })
  });

  const data = await res.json();
  if (res.ok) {
    alert("Password reset successful. Please log in.");
    window.location.href = "index.html";
  } else {
    alert(data.message);
  }
}
</script>
</html>
